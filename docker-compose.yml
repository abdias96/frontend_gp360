# ============================================================
# Frontend interno GP360 (Metronic / Vue 3) — docker compose
# ============================================================
#
# Build + up:    docker compose up --build -d
# Logs:          docker compose logs -f
# Down:          docker compose down
# Rebuild:       docker compose build --no-cache
#
# La imagen es promovible entre dev/staging/prod cambiando BACKEND_URL.
# Para staging/prod en HCI MINGOB se descomentan los labels Traefik.
# ============================================================

services:
  gp360-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_API_URL: ${VITE_APP_API_URL:-/api}
        VITE_APP_FRONTEND_URL: ${VITE_APP_FRONTEND_URL:-}
        VITE_APP_NAME: GP360
        VITE_APP_VERSION: 1.0.0
        VITE_APP_FULL_NAME: "Gestión Penitenciaria 360"
    image: ghcr.io/abdias96/frontend_gp360:latest
    container_name: gp360-frontend
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8083}:80"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://host.docker.internal:8000}
      BACKEND_PROXY_TIMEOUT: ${BACKEND_PROXY_TIMEOUT:-60s}
      NGINX_HOST: ${NGINX_HOST:-_}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.gp360.rule=Host(`gp360.mingob.gob.gt`)"
    #   - "traefik.http.routers.gp360.entrypoints=websecure"
